<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>付款結果 - TheStar</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    body { font-family: system-ui, "PingFang TC", sans-serif; background: #f4f5f7; margin: 0; }
    .box { max-width: 460px; margin: 80px auto; background: #fff; border-radius: 12px;
           padding: 32px; text-align: center; border: 1px solid #e3e5e8; }
    .icon { font-size: 48px; }
    h1 { font-size: 20px; margin: 12px 0 6px; }
    p { color: #666; margin: 4px 0; }
    .ok { color: #1d6b39; }
    .pending { color: #8a6d00; }
    button, a.btn { display: inline-block; margin-top: 18px; padding: 9px 18px; border: 0;
            border-radius: 8px; background: #2f6fed; color: #fff; font-size: 14px;
            cursor: pointer; text-decoration: none; }
    a.ghost { background: #eef1f6; color: #333; margin-left: 8px; }
  </style>
</head>
<body>
<div id="app">
  <div class="box">
    <div v-if="loading">
      <div class="icon">⏳</div>
      <h1>確認付款結果中…</h1>
      <p>訂單 #{{ orderId }}</p>
    </div>
    <div v-else-if="paid">
      <div class="icon ok">✅</div>
      <h1 class="ok">付款成功</h1>
      <p>訂單 #{{ orderId }} 已完成付款</p>
      <a class="btn" href="/index.html">回我的訂單</a>
    </div>
    <div v-else>
      <div class="icon pending">⏳</div>
      <h1 class="pending">尚未確認付款</h1>
      <p>訂單 #{{ orderId }} 還沒收到綠界確認，</p>
      <p>可能是回調延遲，稍候再試。</p>
      <button @click="check">重新確認</button>
      <a class="btn ghost" href="/index.html">回我的訂單</a>
    </div>
  </div>
</div>

<script>
const { createApp } = Vue;
createApp({
  data() {
    return {
      orderId: new URLSearchParams(location.search).get('orderId'),
      loading: true,
      paid: false
    };
  },
  methods: {
    async check() {
      this.loading = true;
      try {
        // 查「已付款」清單，看這張訂單在不在裡面
        const res = await fetch('/thestar/order/member/order?orderStatus=1&page=0&size=100',
                                { credentials: 'same-origin' });
        const data = await res.json();
        const list = data.content || [];
        this.paid = list.some(o => String(o.orderId) === String(this.orderId));
      } catch (e) {
        this.paid = false;
      } finally {
        this.loading = false;
      }
    }
  },
  mounted() { this.check(); }
}).mount('#app');
</script>
</body>
</html>
